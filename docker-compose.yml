services:
  postgres:
    image: postgres:16-alpine
    container_name: agent-mail-postgres
    environment:
      POSTGRES_DB: agent_mail
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - agent-mail-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d agent_mail"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  agent-mail-postgres-data:
