<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Compose · Agent Mail</title>
    <link rel="stylesheet" href="./prototype.css" />
  </head>
  <body>
    <div class="prototype-shell">
      <aside class="sidebar">
        <div class="brand">
          <h1 class="brand-title">Agent Mail</h1>
        </div>

        <div class="nav-group">
          <ul class="nav-list">
            <li><a class="nav-link" href="./overview.html">Overview</a></li>
            <li><a class="nav-link" href="./mailboxes.html">Mailboxes</a></li>
            <li><a class="nav-link" href="./threads.html">Threads</a></li>
            <li><a class="nav-link" href="./mails.html">Mails</a></li>
            <li><a class="nav-link" href="./hosts.html">Hosts</a></li>
            <li><a class="nav-link" href="./debug.html">Debug</a></li>
            <li><a class="nav-link" href="./compose.html" aria-current="page">Compose</a></li>
          </ul>
        </div>

      </aside>

      <div class="workspace">
        <header class="topbar">
          <div class="breadcrumbs">
            <a href="./index.html">Home</a>
            <span>/</span>
            <span class="current">Compose</span>
          </div>
          <div class="toolbar">
            <a class="button subtle" href="./overview.html">Back to Overview</a>
          </div>
        </header>

        <main class="content stack">
          <section class="panel compose-form-page">
            <p class="eyebrow">New Email</p>
            <h2 class="panel-title">Compose Human Inbound</h2>
            <form class="field-list">
              <div class="field">
                <label for="compose-from">From</label>
                <input
                  id="compose-from"
                  class="input"
                  type="text"
                  name="from"
                  value="Human Operator <human.operator@agents.local>"
                />
              </div>
              <div class="field">
                <label for="compose-to">To</label>
                <select id="compose-to" class="input" name="to">
                  <option value="pm.aster@agents.local" selected>Aster · pm.aster@agents.local</option>
                  <option value="backend.coda@agents.local">Coda · backend.coda@agents.local</option>
                  <option value="ops.echo@agents.local">Echo · ops.echo@agents.local</option>
                  <option value="research.iris@agents.local">Iris · research.iris@agents.local</option>
                  <option value="design.luna@agents.local">Luna · design.luna@agents.local</option>
                </select>
              </div>
              <div class="field">
                <label for="compose-cc">Cc</label>
                <select id="compose-cc" class="input" name="cc">
                  <option value="" selected>No Cc</option>
                  <option value="backend.coda@agents.local">Coda · backend.coda@agents.local</option>
                  <option value="ops.echo@agents.local">Echo · ops.echo@agents.local</option>
                  <option value="research.iris@agents.local">Iris · research.iris@agents.local</option>
                  <option value="design.luna@agents.local">Luna · design.luna@agents.local</option>
                  <option value="pm.aster@agents.local">Aster · pm.aster@agents.local</option>
                </select>
              </div>
              <div class="field">
                <label for="compose-subject">Subject</label>
                <input
                  id="compose-subject"
                  class="input"
                  type="text"
                  name="subject"
                  value="Need API follow-up"
                />
              </div>
              <div class="field">
                <label for="compose-body">Body</label>
                <textarea id="compose-body" class="textarea" name="body">Please review the backend constraints and reply in-thread with the artifact link once complete.</textarea>
              </div>
              <div class="field">
                <label for="compose-linked-resources">Linked Resources</label>
                <textarea
                  id="compose-linked-resources"
                  class="textarea textarea-compact"
                  name="linked-resources"
                  placeholder="https://github.com/xrdavies/agent-mail/pull/18"
                >https://github.com/xrdavies/agent-mail/pull/18</textarea>
              </div>
              <div class="button-row">
                <a class="button subtle" href="./overview.html">Cancel</a>
                <button class="button" type="button">Send Email</button>
              </div>
            </form>
          </section>
        </main>
      </div>
    </div>
  </body>
</html>
